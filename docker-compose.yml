services:
  # --- Infrastructure ---
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2-alpine
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["--http_port", "8222"]

  # --- Microservices ---
  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: auth-service
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/auth_db
      JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-key-change-in-production}
      JWT_EXPIRY_HOURS: 24
      JWT_REFRESH_EXPIRY_HOURS: 168
      RUST_LOG: auth_service=debug
    depends_on:
      postgres:
        condition: service_healthy

  user-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: user-service
    ports:
      - "3002:3002"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/user_db
      RUST_LOG: user_service=debug
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  appointment-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: appointment-service
    ports:
      - "3003:3003"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/appointment_db
      NATS_URL: nats://nats:4222
      RUST_LOG: appointment_service=debug
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started

  notification-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: notification-service
    ports:
      - "3004:3004"
    environment:
      MONGO_URL: mongodb://mongodb:27017
      MONGO_DATABASE: notifications
      NATS_URL: nats://nats:4222
      REDIS_URL: redis://redis:6379
      RUST_LOG: notification_service=debug
    depends_on:
      mongodb:
        condition: service_healthy
      nats:
        condition: service_started

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: api-gateway
    ports:
      - "4000:4000"
    environment:
      JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-key-change-in-production}
      AUTH_SERVICE_URL: http://auth-service:3001
      USER_SERVICE_URL: http://user-service:3002
      APPOINTMENT_SERVICE_URL: http://appointment-service:3003
      NOTIFICATION_SERVICE_URL: http://notification-service:3004
      RUST_LOG: api_gateway=debug
    depends_on:
      - auth-service
      - user-service
      - appointment-service
      - notification-service

volumes:
  postgres_data:
  mongo_data:
  uploads:
